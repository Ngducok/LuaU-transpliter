<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="menu.css">
</head>
<body>
  <div id="root" class="screen">
    <div class="panel main-panel">
      <h1 class="title">Welcome to Game</h1>
      <p class="subtitle">Choose an option below</p>
      <div class="button-group">
        <button class="btn btn-primary" data-onclick="OnPlay" data-transition="opacity 0.3s ease">Play</button>
        <button class="btn btn-secondary" data-onclick="OnSettings">Settings</button>
        <button class="btn btn-secondary" data-onclick="OnCredits">Credits</button>
      </div>
    </div>
  </div>
</body>
</html>
